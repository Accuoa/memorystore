services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    entrypoint: >
      sh -c "ollama serve & sleep 3 && ollama pull nomic-embed-text && wait"

  memorystore:
    build: .
    ports:
      - "8787:8787"
    depends_on:
      - ollama
    environment:
      - CONFIG_PATH=/app/config.example.yml
    volumes:
      - memorystore-data:/data

volumes:
  ollama-models:
  memorystore-data:
